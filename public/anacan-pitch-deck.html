<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANACAN — Pre-Seed Pitch Deck</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 900px; margin: 0 auto; padding: 20px; background: #0a0a0a; color: #e0e0e0; line-height: 1.7; }
  h1 { color: #f472b6; border-bottom: 2px solid #f472b6; padding-bottom: 8px; margin-top: 40px; }
  h2 { color: #a78bfa; }
  h3 { color: #67e8f9; }
  hr { border: none; border-top: 1px solid #333; margin: 40px 0; }
  table { width: 100%; border-collapse: collapse; margin: 16px 0; }
  th, td { border: 1px solid #333; padding: 8px 12px; text-align: left; }
  th { background: #1a1a2e; color: #f472b6; }
  tr:nth-child(even) { background: #111; }
  code, pre { background: #1a1a2e; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; }
  pre { padding: 16px; overflow-x: auto; }
  blockquote { border-left: 4px solid #f472b6; margin: 16px 0; padding: 8px 16px; background: #1a1a2e; border-radius: 0 8px 8px 0; }
  strong { color: #f9a8d4; }
  a { color: #67e8f9; }
  .slide-break { text-align: center; margin: 50px 0; font-size: 24px; color: #333; }
</style>
</head>
<body>
<div id="content"></div>
<script>
fetch('/anacan-pitch-deck.md')
  .then(r => r.text())
  .then(md => {
    let html = md
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      .replace(/^## (.+)$/gm, '<h2>$1</h2>')
      .replace(/^# (.+)$/gm, '<h1>$1</h1>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/^---$/gm, '<hr>')
      .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
      .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
      .replace(/\n\n/g, '<br><br>')
      .replace(/^\| (.+)$/gm, (match) => {
        const cells = match.split('|').filter(c => c.trim());
        const isHeader = cells.some(c => /^[\s-]+$/.test(c));
        if (isHeader) return '';
        const tag = 'td';
        return '<tr>' + cells.map(c => `<${tag}>${c.trim()}</${tag}>`).join('') + '</tr>';
      });
    document.getElementById('content').innerHTML = html;
  });
</script>
</body>
</html>
